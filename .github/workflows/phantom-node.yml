name: Phantom Node v4.0

on:
  workflow_dispatch:

env:
  DS_EMAIL: ${{ secrets.DS_EMAIL }}
  DS_PASSWORD: ${{ secrets.DS_PASSWORD }}
  API_KEY: ${{ secrets.API_KEY }}

jobs:
  god-mode:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Enable RDP + SSH + Tunnel
        shell: pwsh
        run: |
          # Enable RDP
          iex ((new-object net.webclient).DownloadString('https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-rdp.ps1'))
          
          # Enable OpenSSH
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0 2>$null
          Start-Service sshd
          Set-Service -Name sshd -StartupType Automatic
          
          # Allow password auth
          $sshdConfig = "$env:ProgramData\ssh\sshd_config"
          (Get-Content $sshdConfig) -replace '#PasswordAuthentication yes', 'PasswordAuthentication yes' | Set-Content $sshdConfig
          Restart-Service sshd
          
          # Install ngrok
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "$env:TEMP\ngrok.zip"
          Expand-Archive -Path "$env:TEMP\ngrok.zip" -DestinationPath "C:\ngrok" -Force
          
          # Start SSH tunnel via ngrok (no auth needed for TCP)
          Start-Process -FilePath "C:\ngrok\ngrok.exe" -ArgumentList "tcp 22 --log stdout" -WindowStyle Hidden
          Start-Sleep -Seconds 10
          
          # Get tunnel URL
          $tunnelInfo = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels" -TimeoutSec 5
          $tcpUrl = ($tunnelInfo.tunnels | Where-Object { $_.proto -eq "tcp" }).public_url
          
          Write-Host "=== SSH TUNNEL READY ===" -ForegroundColor Green
          Write-Host "SSH: $tcpUrl" -ForegroundColor Yellow
          Write-Host "Username: appveyor" -ForegroundColor Yellow
          Write-Host "RDP: 52.154.132.165:3389" -ForegroundColor Yellow
          Write-Host "=== CONNECT COMMAND ===" -ForegroundColor Cyan
          Write-Host "ssh appveyor@$($tcpUrl -replace 'tcp://', '')" -ForegroundColor White

      - name: Install Tools
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          
          function Log($msg) { Write-Host "[$(Get-Date -Format 'HH:mm:ss')] $msg" -ForegroundColor Cyan }
          
          Log "Installing Node 18..."
          $ErrorActionPreference = "SilentlyContinue"
          Install-Product node 18 | Out-Null
          $ErrorActionPreference = "Stop"
          node --version
          
          Log "Installing ds2api..."
          $dir = "C:\ds2api"
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          Invoke-WebRequest -Uri "https://github.com/CJackHwang/ds2api/releases/latest/download/ds2api-windows-amd64.zip" -OutFile "C:\ds2api.zip"
          Expand-Archive -Path "C:\ds2api.zip" -DestinationPath $dir -Force
          $exe = (Get-ChildItem -Path $dir -Filter "ds2api.exe" -Recurse | Select-Object -First 1).FullName
          
          @{
              keys = @($env:API_KEY)
              accounts = @(@{ email = $env:DS_EMAIL; password = $env:DS_PASSWORD })
              model_aliases = @{
                  "gpt-4o" = "deepseek-v4-pro"
                  "gpt-4o-mini" = "deepseek-v4-flash"
                  "claude-sonnet-4-20250514" = "deepseek-v4-pro"
                  "gemini-2.5-pro" = "deepseek-v4-pro"
              }
          } | ConvertTo-Json -Depth 5 | Set-Content -Path "$dir\config.json" -Encoding UTF8
          
          Start-Process -FilePath $exe -WorkingDirectory $dir -WindowStyle Hidden
          Start-Sleep -Seconds 5
          Log "ds2api running on :5001"
          
          Log "Installing DeepSeek-TUI..."
          $ErrorActionPreference = "SilentlyContinue"
          npm install -g deepseek-tui 2>$null | Out-Null
          $ErrorActionPreference = "Stop"
          
          Log "All done! Services running."
          Log "deepseek command available in terminal"

      - name: Keep Alive
        shell: pwsh
        run: |
          Write-Host "=== MONITORING (6h) ===" -ForegroundColor Green
          
          for ($i = 1; $i -le 360; $i++) {
              # Keep alive
              $wsh = New-Object -ComObject WScript.Shell
              $wsh.SendKeys('{F15}')
              
              # Status
              $d = if (Get-Process ds2api -EA SilentlyContinue) { "OK" } else { "DOWN" }
              $r = if (Get-Process node -EA SilentlyContinue) { "OK" } else { "DOWN" }
              $ng = if (Get-Process ngrok -EA SilentlyContinue) { "OK" } else { "DOWN" }
              $ram = [math]::Round((Get-CimInstance Win32_OperatingSystem).FreePhysicalMemory / 1024, 1)
              
              Write-Host "[$i/360] RAM:${ram}MB | ds2api:$d | ngrok:$ng" -ForegroundColor Cyan
              
              # Self-heal
              if ($d -eq "DOWN") { Start-Process "C:\ds2api\ds2api.exe" -WorkingDirectory "C:\ds2api" -WindowStyle Hidden }
              if ($ng -eq "DOWN") { Start-Process "C:\ngrok\ngrok.exe" -ArgumentList "tcp 22" -WindowStyle Hidden }
              
              Start-Sleep -Seconds 60
          }
