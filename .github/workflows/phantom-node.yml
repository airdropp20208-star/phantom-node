name: Phantom Node

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vps:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Setup + Connect
        shell: pwsh
        run: |
          # RDP
          iex ((new-object net.webclient).DownloadString('https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-rdp.ps1'))
          
          # SSH
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0 2>$null
          Start-Service sshd
          Set-Service sshd -StartupType Automatic
          $c = "$env:ProgramData\ssh\sshd_config"
          (Get-Content $c) -replace '#PasswordAuthentication yes','PasswordAuthentication yes' | Set-Content $c
          Restart-Service sshd
          
          # Cloudflared tunnel for SSH
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "C:\cf.exe"
          Start-Process "C:\cf.exe" "tunnel --url ssh://localhost:22" -NoNewWindow -RedirectStandardError "C:\cf.log"
          Start-Sleep 25
          
          # Extract tunnel URL
          $url = (Get-Content "C:\cf.log" -EA SilentlyContinue | Select-String "https://.*trycloudflare").Matches[0].Value
          Write-Host "TUNNEL=$url" -ForegroundColor Green
          
          # Connection info
          $ip = (Invoke-WebRequest "https://api.ipify.org" -TimeoutSec 10).Content
          $info = "Tunnel: $url`nRDP: ${ip}:3389`nUser: appveyor`nPass: /AsS4+LRrs/s8Cx1Pv9BRLDENH9mCLZWkTcd0I=`nSSH: ssh appveyor@$($url -replace 'https://','')"
          $info | Set-Content "CONNECTION.md"
          
          git config user.email "bot@phantom"
          git config user.name "Phantom"
          git add CONNECTION.md
          git commit -m "VPS ready - $(Get-Date -Format HH:mm)" -m "[skip ci]"
          git push

      - name: Keep Alive
        shell: pwsh
        run: |
          for ($i=1;$i -le 350;$i++) {
              (New-Object -ComObject WScript.Shell).SendKeys('{F15}')
              $ram=[math]::Round((Get-CimInstance Win32_OperatingSystem).FreePhysicalMemory/1024,1)
              Write-Host "[$i/350] RAM:${ram}MB" -ForegroundColor Cyan
              Start-Sleep 60
          }
