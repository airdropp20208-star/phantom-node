name: Phantom Node v4.0

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Run duration (minutes)'
        required: false
        default: '360'

env:
  DS_EMAIL: ${{ secrets.DS_EMAIL }}
  DS_PASSWORD: ${{ secrets.DS_PASSWORD }}
  API_KEY: ${{ secrets.API_KEY }}

jobs:
  god-mode:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Enable RDP
        shell: pwsh
        run: |
          iex ((new-object net.webclient).DownloadString('https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-rdp.ps1'))

      - name: Setup Environment
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $logFile = "$env:USERPROFILE\Desktop\phantom-node.log"
          
          function Log($msg, $color = "White") {
              $ts = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
              $line = "[$ts] $msg"
              Write-Host $line -ForegroundColor $color
              Add-Content -Path $logFile -Value $line -ErrorAction SilentlyContinue
          }
          
          function Download-WithRetry($url, $out, $retries = 3) {
              for ($i = 1; $i -le $retries; $i++) {
                  try {
                      Log "Download $i/$retries : $url" Cyan
                      Invoke-WebRequest -Uri $url -OutFile $out -TimeoutSec 120
                      if ((Get-Item $out).Length -gt 0) { return $true }
                  } catch {
                      Log "Failed: $($_.Exception.Message)" Red
                      if ($i -lt $retries) { Start-Sleep -Seconds 5 }
                  }
              }
              return $false
          }
          
          Log "=== PHANTOM NODE v4.0 ===" Magenta
          
          # 1. Debloat
          Log "[1/6] Debloat..." Cyan
          try { Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue } catch { }
          @("wsearch","DiagTrack","SysMain","WerSvc","Spooler","BITS","wuauserv","DoSvc","Schedule") | ForEach-Object {
              Stop-Service -Name $_ -Force -ErrorAction SilentlyContinue
              Set-Service -Name $_ -StartupType Disabled -ErrorAction SilentlyContinue
          }
          Log "  Done" Green
          
          # 2. Node 18 + Chrome
          Log "[2/6] Node 18 + Chrome..." Cyan
          $ErrorActionPreference = "SilentlyContinue"
          Install-Product node 18 | Out-Null
          $ErrorActionPreference = "Stop"
          node --version | ForEach-Object { Log "  Node: $_" Green }
          
          # 3. ds2api
          Log "[3/6] ds2api..." Yellow
          $ds2apiDir = "C:\ds2api"
          New-Item -ItemType Directory -Path $ds2apiDir -Force | Out-Null
          if (Download-WithRetry "https://github.com/CJackHwang/ds2api/releases/latest/download/ds2api-windows-amd64.zip" "C:\ds2api.zip") {
              Expand-Archive -Path "C:\ds2api.zip" -DestinationPath $ds2apiDir -Force
              $exe = (Get-ChildItem -Path $ds2apiDir -Filter "ds2api.exe" -Recurse | Select-Object -First 1).FullName
              $env:DS2API_PATH = $exe
              $env:DS2API_DIR = Split-Path $exe
              
              @{
                  keys = @($env:API_KEY)
                  accounts = @(@{ email = $env:DS_EMAIL; password = $env:DS_PASSWORD })
                  model_aliases = @{
                      "gpt-4o" = "deepseek-v4-pro"
                      "gpt-4o-mini" = "deepseek-v4-flash"
                      "gpt-5" = "deepseek-v4-pro"
                      "o3" = "deepseek-v4-pro"
                      "claude-sonnet-4-20250514" = "deepseek-v4-pro"
                      "claude-3-5-haiku" = "deepseek-v4-flash"
                      "gemini-2.5-pro" = "deepseek-v4-pro"
                      "gemini-2.5-flash" = "deepseek-v4-flash"
                  }
              } | ConvertTo-Json -Depth 5 | Set-Content -Path "$env:DS2API_DIR\config.json" -Encoding UTF8
              
              Start-Process -FilePath $exe -WorkingDirectory $env:DS2API_DIR -WindowStyle Hidden
              Start-Sleep -Seconds 5
              Log "  ds2api started" Green
          }
          
          # 4. DeepSeek-TUI
          Log "[4/6] DeepSeek-TUI..." Cyan
          $ErrorActionPreference = "SilentlyContinue"
          npm install -g deepseek-tui 2>$null | Out-Null
          $ErrorActionPreference = "Stop"
          Log "  Installed" Green
          
          # 5. 9router
          Log "[5/6] 9router..." Yellow
          npm install -g 9router 2>$null | Out-Null
          $9rDir = "$env:USERPROFILE\.9router"
          if (!(Test-Path $9rDir)) { New-Item -ItemType Directory -Path $9rDir -Force | Out-Null }
          
          @{
              "ds2api-local" = @{
                  id="ds2api-local"; name="DeepSeek V4"; type="openai"
                  baseUrl="http://127.0.0.1:5001/v1"; apiKey=$env:API_KEY
                  models=@("deepseek-v4-flash","deepseek-v4-pro","deepseek-v4-flash-nothinking")
                  enabled=$true
              }
          } | ConvertTo-Json -Depth 5 | Set-Content -Path "$9rDir\providers.json" -Encoding UTF8
          
          @{
              mitm = @{ enabled=$true; port=9090 }
              mappings = @(
                  @{ from="gpt-4o"; to="ds2api-local/deepseek-v4-pro" }
                  @{ from="gpt-4o-mini"; to="ds2api-local/deepseek-v4-flash" }
                  @{ from="claude-sonnet-4-20250514"; to="ds2api-local/deepseek-v4-pro" }
                  @{ from="claude-3-5-haiku"; to="ds2api-local/deepseek-v4-flash" }
                  @{ from="gemini-2.5-pro"; to="ds2api-local/deepseek-v4-pro" }
                  @{ from="gemini-2.5-flash"; to="ds2api-local/deepseek-v4-flash" }
              )
          } | ConvertTo-Json -Depth 5 | Set-Content -Path "$9rDir\settings.json" -Encoding UTF8
          
          $npmPrefix = (npm config get prefix 2>$null).Trim()
          $9routerCmd = Join-Path $npmPrefix "9router.cmd"
          $env:ROUTER_PATH = $9routerCmd
          Start-Process -FilePath $9routerCmd -ArgumentList "start","--mitm" -WindowStyle Hidden
          Start-Sleep -Seconds 5
          Log "  9router started" Green
          
          # 6. Config DeepSeek-TUI
          Log "[6/6] Configure DeepSeek-TUI..." Cyan
          $dsDir = "$env:USERPROFILE\.deepseek"
          if (!(Test-Path $dsDir)) { New-Item -ItemType Directory -Path $dsDir -Force | Out-Null }
          @{
              api_base_url = "http://127.0.0.1:5001"
              api_key = $env:API_KEY
              default_model = "deepseek-v4-pro"
          } | ConvertTo-Json | Set-Content -Path "$dsDir\config.json" -Encoding UTF8
          
          Log "=== ALL SERVICES READY ===" Green
          Log "ds2api: :5001 | 9router: :9090 | deepseek: ready" Cyan

      - name: Keep Alive (6h)
        shell: pwsh
        run: |
          $logFile = "$env:USERPROFILE\Desktop\phantom-node.log"
          function Log($msg, $color = "White") {
              $ts = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
              $line = "[$ts] $msg"
              Write-Host $line -ForegroundColor $color
              Add-Content -Path $logFile -Value $line -ErrorAction SilentlyContinue
          }
          
          Log "=== MONITORING START ===" Green
          
          $signature = '[DllImport("psapi.dll")] public static extern int EmptyWorkingSet(IntPtr hwProc);'
          $psapi = Add-Type -MemberDefinition $signature -Name "PSAPI" -Namespace "Win32" -PassThru
          $wsh = New-Object -ComObject WScript.Shell
          
          for ($i = 1; $i -le 360; $i++) {
              $wsh.SendKeys('{F15}')
              
              foreach ($p in @("ds2api","node")) {
                  Get-Process -Name $p -EA SilentlyContinue | ForEach-Object { $_.PriorityClass = "High" }
              }
              
              if (!(Get-Process ds2api -EA SilentlyContinue)) {
                  Log "[!] ds2api restarting" Red
                  Start-Process -FilePath $env:DS2API_PATH -WorkingDirectory $env:DS2API_DIR -WindowStyle Hidden
              }
              if (!(Get-Process node -EA SilentlyContinue)) {
                  Log "[!] 9router restarting" Red
                  Start-Process -FilePath $env:ROUTER_PATH -ArgumentList "start","--mitm" -WindowStyle Hidden
              }
              
              $psapi::EmptyWorkingSet([System.Diagnostics.Process]::GetCurrentProcess().Handle) | Out-Null
              
              $ram = [math]::Round((Get-CimInstance Win32_OperatingSystem).FreePhysicalMemory / 1024, 1)
              $d = if (Get-Process ds2api -EA SilentlyContinue) { "OK" } else { "DOWN" }
              $r = if (Get-Process node -EA SilentlyContinue) { "OK" } else { "DOWN" }
              Log "[$i/360m] RAM:${ram}MB ds2api:$d router:$r" Cyan
              
              Start-Sleep -Seconds 60
          }

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== CLEANUP ===" -ForegroundColor DarkRed
          @("ds2api","node") | ForEach-Object {
              Get-Process -Name $_ -EA SilentlyContinue | Stop-Process -Force -EA SilentlyContinue
          }
          @("$env:USERPROFILE\.antigravity","$env:USERPROFILE\.9router","C:\ds2api.zip") | ForEach-Object {
              Remove-Item $_ -Recurse -Force -EA SilentlyContinue
          }
          Write-Host "Clean!" -ForegroundColor Green
