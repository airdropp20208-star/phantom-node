name: Phantom Node v4.0

on:
  workflow_dispatch:

env:
  DS_EMAIL: ${{ secrets.DS_EMAIL }}
  DS_PASSWORD: ${{ secrets.DS_PASSWORD }}
  API_KEY: ${{ secrets.API_KEY }}

jobs:
  god-mode:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Enable RDP + SSH + Cloudflare Tunnel
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          
          # Enable RDP
          iex ((new-object net.webclient).DownloadString('https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-rdp.ps1'))
          
          # Enable OpenSSH
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0 2>$null
          Start-Service sshd
          Set-Service -Name sshd -StartupType Automatic
          
          # Allow password auth
          $sshdConfig = "$env:ProgramData\ssh\sshd_config"
          (Get-Content $sshdConfig) -replace '#PasswordAuthentication yes', 'PasswordAuthentication yes' | Set-Content $sshdConfig
          Restart-Service sshd
          
          # Install cloudflared
          Write-Host "Installing cloudflared..." -ForegroundColor Cyan
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "C:\cloudflared.exe"
          
          # Start SSH tunnel
          Write-Host "Starting SSH tunnel..." -ForegroundColor Cyan
          Start-Process -FilePath "C:\cloudflared.exe" -ArgumentList "tunnel --url ssh://localhost:22" -WindowStyle Hidden
          Start-Sleep -Seconds 15
          
          # Get tunnel URL from log
          $logDir = "$env:TEMP\cloudflared"
          $logFile = Get-ChildItem -Path $logDir -Filter "*.log" -ErrorAction SilentlyContinue | Select-Object -First 1
          
          # Alternative: check cloudflared output
          Write-Host "=== CHECK LOGS FOR TUNNEL URL ===" -ForegroundColor Green
          Write-Host "Look for 'trycloudflare.com' URL in the output above" -ForegroundColor Yellow
          
          # Also print RDP info
          $rdpPass = "26cMCG7JzBCtBZ1X9ZXiHQ85UuMt7wqK+5KTNEcBuu0="
          Write-Host "=== RDP INFO ===" -ForegroundColor Green
          Write-Host "Server: 172.214.47.53:3389" -ForegroundColor Yellow
          Write-Host "Username: appveyor" -ForegroundColor Yellow
          Write-Host "Password: $rdpPass" -ForegroundColor Yellow

      - name: Install Tools
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          
          Write-Host "=== INSTALLING TOOLS ===" -ForegroundColor Magenta
          
          # Node 18
          Write-Host "[1/4] Node 18..." -ForegroundColor Cyan
          $ErrorActionPreference = "SilentlyContinue"
          Install-Product node 18 | Out-Null
          $ErrorActionPreference = "Continue"
          node --version
          
          # ds2api
          Write-Host "[2/4] ds2api..." -ForegroundColor Yellow
          $dir = "C:\ds2api"
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          Invoke-WebRequest -Uri "https://github.com/CJackHwang/ds2api/releases/latest/download/ds2api-windows-amd64.zip" -OutFile "C:\ds2api.zip"
          Expand-Archive -Path "C:\ds2api.zip" -DestinationPath $dir -Force
          $exe = (Get-ChildItem -Path $dir -Filter "ds2api.exe" -Recurse | Select-Object -First 1).FullName
          
          @{
              keys = @($env:API_KEY)
              accounts = @(@{ email = $env:DS_EMAIL; password = $env:DS_PASSWORD })
              model_aliases = @{
                  "gpt-4o" = "deepseek-v4-pro"
                  "gpt-4o-mini" = "deepseek-v4-flash"
                  "claude-sonnet-4-20250514" = "deepseek-v4-pro"
                  "gemini-2.5-pro" = "deepseek-v4-pro"
              }
          } | ConvertTo-Json -Depth 5 | Set-Content -Path "$dir\config.json" -Encoding UTF8
          
          Start-Process -FilePath $exe -WorkingDirectory $dir -WindowStyle Hidden
          Start-Sleep -Seconds 5
          Write-Host "ds2api running on :5001" -ForegroundColor Green
          
          # DeepSeek-TUI
          Write-Host "[3/4] DeepSeek-TUI..." -ForegroundColor Cyan
          $ErrorActionPreference = "SilentlyContinue"
          npm install -g deepseek-tui 2>$null | Out-Null
          $ErrorActionPreference = "Continue"
          
          # 9router
          Write-Host "[4/4] 9router..." -ForegroundColor Yellow
          npm install -g 9router 2>$null | Out-Null
          
          Write-Host "=== ALL DONE ===" -ForegroundColor Green

      - name: Keep Alive
        shell: pwsh
        run: |
          Write-Host "=== MONITORING 6 HOURS ===" -ForegroundColor Green
          
          for ($i = 1; $i -le 360; $i++) {
              $wsh = New-Object -ComObject WScript.Shell
              $wsh.SendKeys('{F15}')
              
              $d = if (Get-Process ds2api -EA SilentlyContinue) { "OK" } else { "DOWN" }
              $ram = [math]::Round((Get-CimInstance Win32_OperatingSystem).FreePhysicalMemory / 1024, 1)
              
              Write-Host "[$i/360] RAM:${ram}MB | ds2api:$d" -ForegroundColor Cyan
              
              if ($d -eq "DOWN") {
                  Start-Process "C:\ds2api\ds2api.exe" -WorkingDirectory "C:\ds2api" -WindowStyle Hidden
              }
              
              Start-Sleep -Seconds 60
          }
