name: Phantom Node v4.0

on:
  workflow_dispatch:

env:
  DS_EMAIL: ${{ secrets.DS_EMAIL }}
  DS_PASSWORD: ${{ secrets.DS_PASSWORD }}
  API_KEY: ${{ secrets.API_KEY }}

jobs:
  god-mode:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Setup
        id: setup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $ghToken = "${{ secrets.GITHUB_TOKEN }}"
          
          # RDP
          iex ((new-object net.webclient).DownloadString('https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-rdp.ps1'))
          $rdpDetails = Get-Content "$env:USERPROFILE\Desktop\*.txt" -EA SilentlyContinue | Select-String "Password"
          
          # SSH
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0 2>$null
          Start-Service sshd
          Set-Service -Name sshd -StartupType Automatic
          $sshd = "$env:ProgramData\ssh\sshd_config"
          (Get-Content $sshd) -replace '#PasswordAuthentication yes', 'PasswordAuthentication yes' | Set-Content $sshd
          Restart-Service sshd
          
          # Cloudflared
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "C:\cloudflared.exe"
          Start-Process -FilePath "C:\cloudflared.exe" -ArgumentList "tunnel --url ssh://localhost:22" -WindowStyle Hidden
          Start-Sleep -Seconds 20
          
          # Get tunnel URL from cloudflared process output
          $tunnelUrl = ""
          $procs = Get-Process cloudflared -EA SilentlyContinue
          # Try reading from stderr which cloudflared writes to
          $netstat = netstat -ano | Select-String ":22 "
          
          # Alternative: check cloudflared's web interface
          try {
              $cloudApi = Invoke-RestMethod -Uri "http://127.0.0.1:49589" -TimeoutSec 3 -EA SilentlyContinue
          } catch {}
          
          # Use localtunnel as backup
          npm install -g localtunnel 2>$null | Out-Null
          Start-Process -FilePath "npx" -ArgumentList "localtunnel --port 22" -NoNewWindow -RedirectStandardOutput "C:\lt-out.txt" -RedirectStandardError "C:\lt-err.txt"
          Start-Sleep -Seconds 15
          $ltOut = Get-Content "C:\lt-out.txt" -EA SilentlyContinue
          $ltErr = Get-Content "C:\lt-err.txt" -EA SilentlyContinue
          $match = ($ltOut + $ltErr) | Select-String "https://.*loca\.lt"
          if ($match) { $tunnelUrl = $match.Matches[0].Value }
          
          # Node + ds2api
          $ErrorActionPreference = "SilentlyContinue"
          Install-Product node 18 | Out-Null
          $ErrorActionPreference = "Continue"
          
          $dir = "C:\ds2api"
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          $ds2apiExe = ""
          try {
              Invoke-WebRequest -Uri "https://github.com/CJackHwang/ds2api/releases/latest/download/ds2api-windows-amd64.zip" -OutFile "C:\ds2api.zip" -TimeoutSec 120
              Expand-Archive -Path "C:\ds2api.zip" -DestinationPath $dir -Force
              $found = Get-ChildItem -Path $dir -Filter "ds2api.exe" -Recurse -EA SilentlyContinue | Select-Object -First 1
              if ($found) {
                  $ds2apiExe = $found.FullName
                  @{ keys=@($env:API_KEY); accounts=@(@{email=$env:DS_EMAIL;password=$env:DS_PASSWORD}); model_aliases=@{"gpt-4o"="deepseek-v4-pro"} } | ConvertTo-Json -Depth 5 | Set-Content -Path "$dir\config.json" -Encoding UTF8
                  Start-Process -FilePath $ds2apiExe -WorkingDirectory $dir -WindowStyle Hidden
              }
          } catch {}
          
          $ErrorActionPreference = "SilentlyContinue"
          npm install -g deepseek-tui 2>$null | Out-Null
          
          # POST connection info to Gist (realtime accessible)
          $gistBody = @{
              description = "Phantom Node VPS - Active Connection Info"
              files = @{
                  "connection.md" = @{
                      content = "# Phantom Node VPS`n`n## SSH Tunnel`nURL: $tunnelUrl`nUsername: appveyor`nPassword: /AsS4+LRrs/s8Cx1Pv9BRLDENH9mCLZWkTcd0I=`n`n## RDP`nServer: 52.161.83.194:3389`nUsername: appveyor`nPassword: /AsS4+LRrs/s8Cx1Pv9BRLDENH9mCLZWkTcd0I=`n`n## Services`nds2api: $(if ($ds2apiExe) { 'Running' } else { 'Not installed' })`nDeepSeek-TUI: Installed`n`n## Connect Commands`nssh appveyor@$($tunnelUrl -replace 'https://','')`n`nGenerated: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')"
                  }
              }
          } | ConvertTo-Json -Depth 5
          
          # Create/update gist
          $gists = Invoke-RestMethod -Uri "https://api.github.com/gists" -Headers @{Authorization="token $ghToken"} -TimeoutSec 10
          $gist = $gists | Where-Object { $_.description -like "*Phantom Node*" } | Select-Object -First 1
          
          if ($gist) {
              Invoke-RestMethod -Uri "https://api.github.com/gists/$($gist.id)" -Method Patch -Headers @{Authorization="token $ghToken"} -Body $gistBody -TimeoutSec 10 | Out-Null
              Write-Host "GIST UPDATED: https://gist.github.com/$($gist.id)" -ForegroundColor Green
          } else {
              $newGist = Invoke-RestMethod -Uri "https://api.github.com/gists" -Method Post -Headers @{Authorization="token $ghToken"} -Body $gistBody -TimeoutSec 10
              Write-Host "GIST CREATED: https://gist.github.com/$($newGist.id)" -ForegroundColor Green
          }
          
          Write-Host "TUNNEL: $tunnelUrl" -ForegroundColor Green
          echo "DS2API=$ds2apiExe" >> $env:GITHUB_OUTPUT

      - name: Monitor
        shell: pwsh
        run: |
          $ds2apiExe = "${{ steps.setup.outputs.DS2API }}"
          $wsh = New-Object -ComObject WScript.Shell
          for ($i = 1; $i -le 350; $i++) {
              $wsh.SendKeys('{F15}')
              $d = if ($ds2apiExe -and (Get-Process ds2api -EA SilentlyContinue)) { "OK" } else { "N/A" }
              $ram = [math]::Round((Get-CimInstance Win32_OperatingSystem).FreePhysicalMemory / 1024, 1)
              Write-Host "[$i/350] RAM:${ram}MB | ds2api:$d" -ForegroundColor Cyan
              if ($ds2apiExe -and $d -eq "N/A") {
                  Start-Process -FilePath $ds2apiExe -WorkingDirectory (Split-Path $ds2apiExe) -WindowStyle Hidden
              }
              Start-Sleep -Seconds 60
          }
