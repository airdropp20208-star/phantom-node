name: Deploy Phantom Node
on:
  workflow_dispatch:
    inputs:
      deepseek_email:
        description: "DeepSeek Email"
        required: false
        default: ""
      deepseek_password:
        description: "DeepSeek Password"
        required: false
        default: ""
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ds2api
        run: |
          curl -L -o ds2api.tar.gz "https://github.com/CJackHwang/ds2api/releases/download/v4.6.1/ds2api_v4.6.1_linux_amd64.tar.gz"
          tar -xzf ds2api.tar.gz && mv ds2api_v4.6.1_linux_amd64 ds2api && chmod +x ds2api/ds2api && rm ds2api.tar.gz
          echo "ds2api OK"

      - name: Install 9router
        run: npm install -g 9router && echo "9router OK"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code && echo "claude OK"

      - name: Configure ds2api
        env:
          DS_EMAIL: ${{ github.event.inputs.deepseek_email }}
          DS_PASSWORD: ${{ github.event.inputs.deepseek_password }}
        run: |
          EMAIL="${DS_EMAIL:-tooltdshaha00001@gmail.com}"
          PASS="${DS_PASSWORD:-son22tq2011}"
          printf '{"keys":["sk-phantom"],"accounts":[{"email":"%s","password":"%s"}],"model_aliases":{"gpt-4o":"deepseek-v4-flash","gpt-4o-mini":"deepseek-v4-flash","claude-sonnet-4-6":"deepseek-v4-flash","claude-opus-4-6":"deepseek-v4-pro"},"runtime":{"account_max_inflight":2,"token_refresh_interval_hours":6}}\n' "$EMAIL" "$PASS" > ds2api/config.json
          echo "ds2api configured"

      - name: Configure 9router
        run: |
          mkdir -p ~/.9router
          printf '{"port":20128,"providers":{"ds2api":{"type":"openai","base_url":"http://localhost:5001/v1","api_key":"sk-phantom"}},"routes":{"default":"ds2api","deepseek-v4-pro":"ds2api","deepseek-v4-flash":"ds2api"}}\n' > ~/.9router/config.json
          echo "9router configured"

      - name: Configure Claude Code
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          mkdir -p ~/.claude
          cat > ~/.claude/settings.json << 'CCEOF'
          {"permissions":{"allow":["Bash(*)","Read","Write","Edit","WebSearch","WebFetch"]}}
          CCEOF
          echo "claude configured"

      - name: Start ds2api
        run: |
          cd ds2api && nohup ./ds2api > ../ds2api.log 2>&1 & echo $! > ../ds2api.pid && cd ..
          sleep 5
          curl -s http://localhost:5001/healthz > /dev/null && echo "ds2api running" || echo "ds2api starting..."

      - name: Start 9router
        run: |
          nohup 9router > 9router.log 2>&1 & echo $! > 9router.pid
          sleep 10
          if ss -tlnp | grep -q ':20128'; then echo "9router running"; else echo "9router starting..."; fi

      - name: Start Telegram Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ALLOWED_USERS: "7563947218"
          ANTHROPIC_BASE_URL: "http://localhost:20128/v1"
          ANTHROPIC_API_KEY: "sk-phantom"
        run: |
          nohup python3 telegram-bot.py > telegram-bot.log 2>&1 & echo $! > telegram-bot.pid
          sleep 5
          kill -0 $(cat telegram-bot.pid) 2>/dev/null && echo "telegram bot running" || echo "telegram bot starting..."

      - name: Setup SSH
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          sudo apt-get update -qq && sudo apt-get install -y -qq openssh-server
          sudo systemctl start ssh
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "runner:phantom123" | sudo chpasswd
          sudo systemctl restart ssh
          cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 &
          echo $! > tunnel.pid
          sleep 15
          TUNNEL_URL=$(grep -o 'https://[^ ]*trycloudflare\.com' tunnel.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "SSH: ssh runner@$TUNNEL_URL (pass: phantom123)"
            echo "SSH: ssh runner@$TUNNEL_URL" > CONNECTION.md
            echo "Password: phantom123" >> CONNECTION.md
            git config user.email "bot@phantom-node" && git config user.name "Bot"
            git add CONNECTION.md && git commit -m "chore: connection [skip ci]" || true && git push
          else
            echo "tunnel starting..."
          fi

      - name: Verify
        run: |
          echo "=== Status ==="
          curl -s http://localhost:5001/healthz > /dev/null && echo "ds2api: OK" || echo "ds2api: FAIL"
          ss -tlnp | grep -q ':20128' && echo "9router: OK" || echo "9router: FAIL"
          command -v claude > /dev/null && echo "claude: OK" || echo "claude: FAIL"
          kill -0 $(cat telegram-bot.pid 2>/dev/null) 2>/dev/null && echo "telegram-bot: OK" || echo "telegram-bot: FAIL"
          echo "Flow: Telegram -> Claude Code -> 9router -> ds2api -> DeepSeek"

      - name: Keep Alive
        run: |
          while true; do
            TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
            if ! curl -s http://localhost:5001/healthz > /dev/null 2>&1; then
              echo "[$TIMESTAMP] ds2api down, restarting..."
              cd ds2api && nohup ./ds2api > ../ds2api.log 2>&1 & echo $! > ../ds2api.pid && cd ..
            fi
            if ! ss -tlnp | grep -q ':20128'; then
              echo "[$TIMESTAMP] 9router down, restarting..."
              nohup 9router > 9router.log 2>&1 & echo $! > 9router.pid
            fi
            if ! kill -0 $(cat telegram-bot.pid 2>/dev/null) 2>/dev/null; then
              echo "[$TIMESTAMP] telegram bot down, restarting..."
              nohup python3 telegram-bot.py > telegram-bot.log 2>&1 & echo $! > telegram-bot.pid
            fi
            if ! kill -0 $(cat tunnel.pid 2>/dev/null) 2>/dev/null; then
              echo "[$TIMESTAMP] tunnel down, restarting..."
              nohup cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 & echo $! > tunnel.pid
            fi
            sleep 300
          done
