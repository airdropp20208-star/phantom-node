name: Deploy Phantom Node
on:
  workflow_dispatch:
    inputs:
      deepseek_email:
        description: "DeepSeek Email"
        required: false
        default: ""
      deepseek_password:
        description: "DeepSeek Password"
        required: false
        default: ""
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install ds2api
        run: |
          curl -L -o ds2api.tar.gz "https://github.com/CJackHwang/ds2api/releases/download/v4.6.1/ds2api_v4.6.1_linux_amd64.tar.gz"
          tar -xzf ds2api.tar.gz && mv ds2api_v4.6.1_linux_amd64 ds2api
          chmod +x ds2api/ds2api && rm ds2api.tar.gz
          echo "ds2api OK"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code && echo "claude OK"

      - name: Install Hermes
        run: pip install hermes-agent && echo "hermes OK"

      - name: Configure ds2api
        env:
          DS_EMAIL: ${{ github.event.inputs.deepseek_email }}
          DS_PASSWORD: ${{ github.event.inputs.deepseek_password }}
        run: |
          EMAIL="${DS_EMAIL:-tooltdshaha00001@gmail.com}"
          PASS="${DS_PASSWORD:-son22tq2011}"
          printf '{"keys":["sk-phantom"],"accounts":[{"email":"%s","password":"%s"}],"model_aliases":{"gpt-4o":"deepseek-v4-pro-nothinking","gpt-4o-mini":"deepseek-v4-flash","claude-sonnet-4-6":"deepseek-v4-pro-nothinking","claude-opus-4-6":"deepseek-v4-pro-nothinking"},"runtime":{"account_max_inflight":2,"token_refresh_interval_hours":6}}\n' "$EMAIL" "$PASS" > ds2api/config.json
          echo "ds2api configured"

      - name: Configure Claude Code
        run: |
          mkdir -p ~/.claude
          printf '{"permissions":{"allow":["Bash(*)","Read","Write","Edit"]}}\n' > ~/.claude/settings.json
          echo "claude configured"

      - name: Configure Hermes
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          mkdir -p ~/.hermes
          printf "OPENAI_API_KEY=sk-phantom\nOPENAI_API_BASE=http://localhost:5001/v1\nBOT_TOKEN=%s\n" "$BOT_TOKEN" > ~/.hermes/.env
          printf 'model:\n  default: deepseek-v4-pro-nothinking\n  provider: openai\n  base_url: http://localhost:5001/v1\nproviders: {}\nfallback_providers: []\ntoolsets:\n- hermes-cli\nagent:\n  max_turns: 90\n  gateway_timeout: 1800\n  api_max_retries: 3\n  tool_use_enforcement: auto\n  disabled_toolsets: []\nterminal:\n  backend: local\n  timeout: 300\n  persistent_shell: true\ndisplay:\n  personality: kawaii\n  language: vi\nsecurity:\n  allow_private_urls: true\n  redact_secrets: true\n  allow_lazy_installs: true\nmemory:\n  memory_enabled: true\n  user_profile_enabled: true\ncontext:\n  engine: compressor\ncompression:\n  enabled: true\ntelegram:\n  bot_token: "%s"\n  allowed_chats: "*"\n  reactions: false\n  channel_prompts: {}\nplatform_toolsets:\n  cli:\n  - browser\n  - clarify\n  - code_execution\n  - cronjob\n  - delegation\n  - file\n  - memory\n  - session_search\n  - skills\n  - terminal\n  - todo\n  - vision\n  - web\n  telegram:\n  - browser\n  - clarify\n  - code_execution\n  - cronjob\n  - delegation\n  - file\n  - memory\n  - session_search\n  - skills\n  - terminal\n  - todo\n  - vision\n  - web\n_config_version: 23\n' "$BOT_TOKEN" > ~/.hermes/config.yaml
          echo "hermes configured"

      - name: Start ds2api
        run: |
          cd ds2api && nohup ./ds2api > ../ds2api.log 2>&1 & echo $! > ../ds2api.pid && cd ..
          sleep 5
          curl -s http://localhost:5001/healthz > /dev/null && echo "ds2api running" || echo "ds2api starting..."

      - name: Start Gateway
        run: |
          source ~/.bashrc
          export OPENAI_API_KEY=sk-phantom
          export OPENAI_API_BASE=http://localhost:5001/v1
          nohup hermes gateway > hermes-gateway.log 2>&1 & echo $! > hermes-gateway.pid
          sleep 10
          kill -0 $(cat hermes-gateway.pid) 2>/dev/null && echo "gateway running" || echo "gateway starting..."

      - name: Setup SSH
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          sudo apt-get update -qq && sudo apt-get install -y -qq openssh-server
          sudo systemctl start ssh
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "runner:phantom123" | sudo chpasswd
          sudo systemctl restart ssh
          cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 &
          echo $! > tunnel.pid
          sleep 15
          TUNNEL_URL=$(grep -o 'https://[^ ]*trycloudflare\.com' tunnel.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "SSH: ssh runner@$TUNNEL_URL (pass: phantom123)"
            echo "SSH: ssh runner@$TUNNEL_URL" > CONNECTION.md
            echo "Password: phantom123" >> CONNECTION.md
            git config user.email "bot@phantom-node" && git config user.name "Bot"
            git add CONNECTION.md && git commit -m "chore: connection [skip ci]" || true && git push
          fi

      - name: Verify
        run: |
          echo "=== Status ==="
          curl -s http://localhost:5001/healthz > /dev/null && echo "ds2api: OK" || echo "ds2api: FAIL"
          command -v claude > /dev/null && echo "claude: OK" || echo "claude: FAIL"
          command -v hermes > /dev/null && echo "hermes: OK" || echo "hermes: FAIL"
          kill -0 $(cat hermes-gateway.pid 2>/dev/null) 2>/dev/null && echo "gateway: OK" || echo "gateway: FAIL"
          echo "Model: deepseek-v4-pro-nothinking"
          echo "Flow: Telegram -> Hermes -> Claude Code -> ds2api -> DeepSeek"

      - name: Keep Alive
        run: |
          while true; do
            TS=$(date '+%Y-%m-%d %H:%M:%S')
            curl -s http://localhost:5001/healthz > /dev/null 2>&1 || {
              echo "[$TS] ds2api down, restarting..."
              cd ds2api && nohup ./ds2api > ../ds2api.log 2>&1 & echo $! > ../ds2api.pid && cd ..
            }
            kill -0 $(cat hermes-gateway.pid 2>/dev/null) 2>/dev/null || {
              echo "[$TS] gateway down, restarting..."
              source ~/.bashrc
              export OPENAI_API_KEY=sk-phantom
              export OPENAI_API_BASE=http://localhost:5001/v1
              nohup hermes gateway > hermes-gateway.log 2>&1 & echo $! > hermes-gateway.pid
            }
            kill -0 $(cat tunnel.pid 2>/dev/null) 2>/dev/null || {
              echo "[$TS] tunnel down, restarting..."
              nohup cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 & echo $! > tunnel.pid
            }
            sleep 300
          done
