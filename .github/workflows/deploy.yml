name: Deploy Phantom Node
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb scrot imagemagick poppler-utils ffmpeg curl jq

      - name: Install Python packages
        run: |
          pip install requests markitdown python-pptx openpyxl python-docx pymupdf anthropic playwright cloakbrowser ui-tars
          playwright install chromium --with-deps 2>/dev/null || true

      - name: Clone & install PPT Master
        run: |
          git clone https://github.com/hugohe3/ppt-master.git /tmp/ppt-master 2>/dev/null || true
          cd /tmp/ppt-master && pip install -r requirements.txt 2>/dev/null || true

      - name: Install Node.js MCP + tools
        run: |
          npm install -g \
            @modelcontextprotocol/server-filesystem \
            @modelcontextprotocol/server-github \
            @supabase/mcp-server-supabase \
            @upstash/context7-mcp \
            @colbymchenry/codegraph

      - name: Init CodeGraph
        run: codegraph init -i --yes 2>/dev/null || true

      - name: Clone OpenCut
        run: |
          git clone https://github.com/opencut-app/opencut.git /tmp/opencut 2>/dev/null || true

      - name: Start Telegram Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
          API_BASE: "https://api.xiaomimimo.com/v1"
          MODEL: "mimo-v2.5"
          ALLOWED_CHATS: ${{ secrets.ALLOWED_CHATS }}
        run: |
          nohup python3 telegram-bot.py > bot.log 2>&1 &
          echo $! > bot.pid
          sleep 3
          kill -0 $(cat bot.pid) 2>/dev/null && echo "bot OK" || (echo "bot FAIL" && cat bot.log)

      - name: Setup SSH
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          sudo apt-get install -y -qq openssh-server
          sudo systemctl start ssh
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "runner:phantom123" | sudo chpasswd
          sudo systemctl restart ssh
          cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 &
          echo $! > tunnel.pid
          sleep 15
          TUNNEL_URL=$(grep -o 'https://[^ ]*trycloudflare\.com' tunnel.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "SSH: ssh runner@$TUNNEL_URL (pass: phantom123)" > CONNECTION.md
            echo "Password: phantom123" >> CONNECTION.md
            git config user.email "bot@phantom-node" && git config user.name "Bot"
            git add CONNECTION.md && git commit -m "chore: connection [skip ci]" || true && git push
          fi

      - name: Verify
        run: |
          echo "=== Bot ==="
          kill -0 $(cat bot.pid 2>/dev/null) 2>/dev/null && echo "bot: OK" || echo "bot: FAIL"
          echo "=== MCP Tools ==="
          npm list -g --depth=0 2>/dev/null | grep -E "server-|context7|mcp-|playwright|codegraph|supabase"
          echo "=== CodeGraph ==="
          which codegraph 2>/dev/null && echo "OK" || echo "not found"
          echo "=== MarkItDown ==="
          which markitdown 2>/dev/null && echo "OK" || echo "not found"
          echo "=== PPT Master ==="
          ls /tmp/ppt-master/README.md 2>/dev/null && echo "OK" || echo "not cloned"
          echo "=== OpenCut ==="
          ls /tmp/opencut/README.md 2>/dev/null && echo "OK" || echo "not cloned"
          echo "=== Playwright ==="
          python3 -c "import playwright; print('OK')" 2>/dev/null || echo "not found"

      - name: Keep Alive
        run: |
          while true; do
            TS=$(date '+%Y-%m-%d %H:%M:%S')
            kill -0 $(cat bot.pid 2>/dev/null) 2>/dev/null || {
              echo "[$TS] bot down, restarting..."
              nohup python3 telegram-bot.py > bot.log 2>&1 &
              echo $! > bot.pid
            }
            kill -0 $(cat tunnel.pid 2>/dev/null) 2>/dev/null || {
              echo "[$TS] tunnel down, restarting..."
              nohup cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 &
              echo $! > tunnel.pid
            }
            sleep 300
          done
